<style>

  .timer-item .number { font-size: clamp(1.8rem,4vw,3rem); font-weight: 700; color: #880e4f; display: block; animation: pulse 2s ease-in-out infinite; }

  .memories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

  .card-img-wrapper .card-img.placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; }

<script>

// ==================== 初始化 Firebase ====================
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const storage = firebase.storage();

// ==================== 你的内容配置 ====================
const CONFIG = {
  startDate: '2025-05-20',
  partner1: '&#x1F466; 啵啵裕',
  partner2: '&#x1F467; 啵啵鲜',
  memories: [
    { date: '2025-05-20', quote: '那天，我们的故事开始了' },
    { date: '2025-06-01', quote: '第一次一起过儿童节，两个大小孩' },
    { date: '2025-07-15', quote: '夏天的晚风和你，都很温柔' },
    { date: '2025-08-29', quote: '七夕，牛郎织女都没我们甜' },
    { date: '2025-10-01', quote: '国庆假期，一起看遍人山人海' },
    { date: '2025-12-25', quote: '圣诞树下，你是我最好的礼物' },
  ]
};

// ==================== 照片存储（Firebase） ====================
let savedPhotos = {};

// 从 Firestore 加载照片
async function loadPhotosFromCloud() {
  try {
    const snap = await db.collection('photos').get();
    savedPhotos = {};
    snap.forEach(function(doc) {
      savedPhotos[doc.id] = doc.data().url;
    });
  } catch (e) {
    console.log('加载照片失败:', e.message);
  }
}

// 上传照片到 Firebase Storage
async function uploadPhoto(index, blob) {
  const ref = storage.ref('photos/' + index + '.jpg');
  await ref.put(blob);
  const url = await ref.getDownloadURL();
  // 保存 URL 到 Firestore
  await db.collection('photos').doc(String(index)).set({ url: url });
  savedPhotos[index] = url;
  return url;
}

// 删除照片
async function deletePhoto(index) {
  try {
    await storage.ref('photos/' + index + '.jpg').delete();
  } catch (e) { /* 文件可能不存在 */ }
  await db.collection('photos').doc(String(index)).delete();
  delete savedPhotos[index];
}

// ==================== 初始化页面内容 ====================
function initContent() {
  document.getElementById('heroNames').innerHTML =
    `${CONFIG.partner1} <span style="font-weight:300;color:#f06292;margin:0 8px;">&amp;</span> ${CONFIG.partner2}`;
}

// ==================== 恋爱计时器 ====================
function updateTimer() {
  const start = new Date(CONFIG.startDate + 'T00:00:00');
  const now = new Date();
  if (now < start) return;

  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  let days = now.getDate() - start.getDate();
  let hours = now.getHours() - start.getHours();
  let minutes = now.getMinutes() - start.getMinutes();
  let seconds = now.getSeconds() - start.getSeconds();

  if (seconds < 0) { seconds += 60; minutes--; }
  if (minutes < 0) { minutes += 60; hours--; }
  if (hours < 0) { hours += 24; days--; }
  if (days < 0) {
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate(); months--;
  }
  if (months < 0) { months += 12; years--; }

  document.getElementById('tYears').textContent = years;
  document.getElementById('tMonths').textContent = months;
  document.getElementById('tDays').textContent = days;
  document.getElementById('tHours').textContent = String(hours).padStart(2, '0');
  document.getElementById('tMins').textContent = String(minutes).padStart(2, '0');
  document.getElementById('tSecs').textContent = String(seconds).padStart(2, '0');
}

// ==================== 纪念日倒数 ====================
function updateCountdown() {
  const start = new Date(CONFIG.startDate + 'T00:00:00');
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  let year = now.getFullYear();
  let anniversary = new Date(year, start.getMonth(), start.getDate());
  if (anniversary <= today) {
    year++;
    anniversary = new Date(year, start.getMonth(), start.getDate());
  }

  const yearNum = year - start.getFullYear();
  document.getElementById('anniversaryLabel').textContent =
    `距离 ${yearNum} 周年纪念日 (${anniversary.getFullYear()}年${String(anniversary.getMonth()+1).padStart(2,'0')}月${String(anniversary.getDate()).padStart(2,'0')}日)`;

  const diff = anniversary - now;
  if (diff <= 0) {
    document.getElementById('countdownDisplay').innerHTML =
      `<div class="anniversary-today">&#x1F389; 今天是我们 ${yearNum} 周年纪念日！&#x1F389;</div>`;
    return;
  }

  const totalSecs = Math.floor(diff / 1000);
  const d = Math.floor(totalSecs / 86400);
  const h = Math.floor((totalSecs % 86400) / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;

  document.getElementById('cdDays').textContent = d;
  document.getElementById('cdHours').textContent = String(h).padStart(2, '0');
  document.getElementById('cdMins').textContent = String(m).padStart(2, '0');
  document.getElementById('cdSecs').textContent = String(s).padStart(2, '0');
}

// ==================== 回忆墙 ====================
const emojis = ['&#x1F954;','&#x1F955;','&#x1F338;','&#x1F49D;','&#x1F955;','&#x1F954;','&#x1F33A;','&#x2728;'];

function handleFilePick(index, wrapperEl) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';

  input.addEventListener('change', async function() {
    const file = this.files && this.files[0];
    if (!file) return;

    wrapperEl.innerHTML = '<div class="card-img placeholder" style="font-size:1rem;">上传中...</div>';

    if (file.size > 10 * 1024 * 1024) {
      alert('照片不能超过 10MB');
      updateCardImage(wrapperEl, index);
      return;
    }

    try {
      const dataUrl = await compressImage(file);
      const blob = dataURLtoBlob(dataUrl);
      await uploadPhoto(index, blob);
    } catch (err) {
      alert('上传失败: ' + (err.message || '网络错误'));
    }
    updateCardImage(wrapperEl, index);
  });

  input.click();
}

function compressImage(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const maxW = 800;
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        let quality = 0.8;
        let dataUrl;
        for (let attempt = 0; attempt < 4; attempt++) {
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          dataUrl = canvas.toDataURL('image/jpeg', quality);
          if (dataUrl.length < 600 * 1024) break;
          quality -= 0.2;
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function dataURLtoBlob(dataurl) {
  const parts = dataurl.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const bytes = atob(parts[1]);
  const buf = new ArrayBuffer(bytes.length);
  const arr = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([buf], { type: mime });
}

function updateCardImage(wrapperEl, index) {
  const photoData = savedPhotos[index];
  const hasPhoto = !!photoData;

  wrapperEl.innerHTML = '';
  wrapperEl.style.background = hasPhoto ? 'transparent' : '';

  if (hasPhoto) {
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = photoData;
    img.alt = '';
    wrapperEl.appendChild(img);
  } else {
    const placeholder = document.createElement('div');
    placeholder.className = 'card-img placeholder';
    placeholder.innerHTML = emojis[index % emojis.length];
    wrapperEl.appendChild(placeholder);
  }

  const overlay = document.createElement('div');
  overlay.className = 'upload-overlay';

  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'btn-icon';
  uploadBtn.title = hasPhoto ? '更换照片' : '上传照片';
  uploadBtn.innerHTML = '&#x1F4F7;';
  uploadBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    handleFilePick(index, wrapperEl);
  });

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-icon btn-delete';
  deleteBtn.title = '删除照片';
  deleteBtn.innerHTML = '&#x2715;';
  deleteBtn.style.display = hasPhoto ? 'flex' : 'none';
  deleteBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    deletePhoto(index).then(function() {
      updateCardImage(wrapperEl, index);
    });
  });

  overlay.appendChild(uploadBtn);
  overlay.appendChild(deleteBtn);
  wrapperEl.appendChild(overlay);
}

function renderMemories() {
  const grid = document.getElementById('memoriesGrid');
  grid.innerHTML = '';

  CONFIG.memories.forEach(function(m, i) {
    const photoData = savedPhotos[i];
    const hasPhoto = !!photoData;

    const card = document.createElement('div');
    card.className = 'memory-card';

    const wrapper = document.createElement('div');
    wrapper.className = 'card-img-wrapper';
    wrapper.addEventListener('click', function() {
      handleFilePick(i, wrapper);
    });

    if (hasPhoto) {
      wrapper.style.background = 'transparent';
      const img = document.createElement('img');
      img.className = 'card-img';
      img.src = photoData;
      img.alt = '';
      img.loading = 'lazy';
      wrapper.appendChild(img);
    } else {
      const placeholder = document.createElement('div');
      placeholder.className = 'card-img placeholder';
      placeholder.innerHTML = emojis[i % emojis.length];
      wrapper.appendChild(placeholder);
    }

    const overlay = document.createElement('div');
    overlay.className = 'upload-overlay';

    const uploadBtn = document.createElement('button');
    uploadBtn.className = 'btn-icon';
    uploadBtn.title = hasPhoto ? '更换照片' : '上传照片';
    uploadBtn.innerHTML = '&#x1F4F7;';
    uploadBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      handleFilePick(i, wrapper);
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-icon btn-delete';
    deleteBtn.title = '删除照片';
    deleteBtn.innerHTML = '&#x2715;';
    deleteBtn.style.display = hasPhoto ? 'flex' : 'none';
    deleteBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      deletePhoto(i).then(function() {
        updateCardImage(wrapper, i);
      });
    });

    overlay.appendChild(uploadBtn);
    overlay.appendChild(deleteBtn);
    wrapper.appendChild(overlay);

    card.appendChild(wrapper);

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML =
      '<div class="card-date">' + m.date + '</div>' +
      '<div class="card-quote">' + m.quote + '</div>';
    card.appendChild(body);

    grid.appendChild(card);
  });
}

// ==================== 花瓣飘落 ====================
function initPetals() {
  const canvas = document.getElementById('petalCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const items = [];
  const MAX_PETALS = 28, MAX_VEGGIES = 10;

  function createPetal() {
    return {
      type: 'petal',
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height,
      size: 10 + Math.random() * 14,
      speedY: 0.5 + Math.random() * 1.5,
      speedX: -0.4 + Math.random() * 0.8,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.03,
      opacity: 0.4 + Math.random() * 0.4,
      color: Math.random() < 0.5 ? '#f48fb1' : '#f8bbd0',
    };
  }

  function createVeggie() {
    const vegEmojis = ['\u{1F954}', '\u{1F955}'];
    return {
      type: 'veggie',
      emoji: vegEmojis[Math.floor(Math.random() * vegEmojis.length)],
      x: Math.random() * canvas.width,
      y: -40 - Math.random() * canvas.height * 0.5,
      size: 18 + Math.random() * 16,
      speedY: 0.35 + Math.random() * 0.9,
      speedX: -0.3 + Math.random() * 0.6,
      opacity: 0.3 + Math.random() * 0.35,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.015 + Math.random() * 0.025,
    };
  }

  for (let i = 0; i < MAX_PETALS; i++) items.push(createPetal());
  for (let i = 0; i < MAX_VEGGIES; i++) items.push(createVeggie());

  function drawItem(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.globalAlpha = p.opacity;
    if (p.type === 'petal') {
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.5, p.size * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.rotate(Math.sin(p.wobble) * 0.35);
      ctx.font = p.size + 'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.emoji, 0, 0);
    }
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < items.length; i++) {
      const p = items[i];
      p.y += p.speedY;
      p.x += p.speedX;
      if (p.type === 'petal') p.rotation += p.rotSpeed;
      else p.wobble += p.wobbleSpeed;
      drawItem(p);
      if (p.y > canvas.height + 50) {
        items[i] = p.type === 'petal' ? createPetal() : createVeggie();
        items[i].y = -50;
      }
      if (p.x < -40) p.x = canvas.width + 40;
      if (p.x > canvas.width + 40) p.x = -40;
    }
    requestAnimationFrame(animate);
  }

  animate();
}

// ==================== 启动 ====================
async function init() {
  await loadPhotosFromCloud();
  initContent();
  renderMemories();
  initPetals();
  updateTimer();
  updateCountdown();
  setInterval(updateTimer, 1000);
  setInterval(updateCountdown, 1000);
}
init();
</script>
